title = 'Under7kg | the art of lightness'
baseURL = 'https://under7kg.pages.dev/'
languageCode = 'en-us'
#theme = 'default'
#theme = 'temple'
theme = "PaperMod"

[pagination]
  pagerSize = 16

# Enables Chroma-based syntax highlighting with theme "friendly"
# See https://xyproto.github.io/splash/docs/ for other theme options
pygmentsStyle = "friendly"
pygmentsCodeFences = true

[permalinks]
    posts = "/:slug/"

[params]
  topmenu = "categories"
  ShowReadingTime = true
#  ShowBreadCrumbs = true
#  ShowToc = true
#  TocOpen = true
  [params.footer]
    text = "⚡ [under7kg@blink](lightning:under7kg@blink.sv) ⚡"

  #[params.author]
    #name = "jin"
    #github = "under7kg"
    #email = "under7kg@proton.me"
    #bluesky = "ukigumo.bsky.social"
    #nostr = "npub1c0pw59sdy4euuy7ghaxtkm73ug6gm8puhjw3fy4wtes6caxt8zasufn4de"
    #zap = "under7kg@blink.sv"

[markup]
  defaultMarkdownHandler = "goldmark"
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
    [markup.goldmark.parser.attribute]
      block = true
      title = true

# taxonomies の修正
[taxonomies]
  category = "categories"
  tag = "tags"
  series = "series"

# メニュー設定
[[menu.main]]
  identifier = "categories"
  name = "categories"
  url = "/categories/"
  weight = 10

[[menu.main]]
  identifier = "tags"
  name = "tags"
  url = "/tags/"
  weight = 20

# [[menu.main]]
#   identifier = "series"
#   name = "series"
#   url = "/series/"
#   weight = 25

[[menu.main]]
  identifier = "about"
  name = "about"
  url = "/about/"
  weight = 30

# llms.txt サポート
# グローバル用 + category毎の /categories/<name>/llms.txt
[outputFormats]
  [outputFormats.llms]
    mediaType = "text/plain"
    baseName = "llms"
    isPlainText = true
    notAlternative = true

[outputs]
  home = ["HTML", "RSS", "JSON", "llms"]
  term = ["HTML", "llms"]
  #taxonomy = ["HTML", "llms"]   # オプション: /categories/llms.txt も作る場合
